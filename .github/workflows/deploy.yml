name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        # Remove this step if you are not using 1Password.
        # Set OP_SERVICE_ACCOUNT_TOKEN in GitHub Secrets instead.
        # Store your Cloudflare token in 1Password as:
        #   Vault: DevOps  |  Item: Cloudflare  |  Field: api_token
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_API_TOKEN: op://DevOps/Cloudflare/api_token
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name gershon-finance
        env:
          # Uses token from 1Password if OP step succeeded, otherwise falls back to GitHub Secret
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 0b8434adba9af8231df90a1f3d2e6e12
